id: exposed-git-config
name: Exposed .git/config
severity: critical
cwe: CWE-527
description: "The Git configuration file is publicly accessible, exposing repository details and potentially credentials."
recommendation: "Block access to the .git directory entirely. Add '/.git' to deny rules in your web server."
request:
  method: GET
  path: /.git/config
matchers:
  - type: status
    values: [200]
  - type: body_contains
    values: ["[core]", "[remote", "[branch", "repositoryformatversion"]
    condition: any
